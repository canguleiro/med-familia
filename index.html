<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedFamília - Gestão de Saúde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .active-nav-mobile { color: #4f46e5; border-top: 2px solid #4f46e5; }
        .hidden { display: none !important; }
        .medicine-row { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input, select, textarea { font-size: 16px !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .modal-overlay { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .chip-active { background-color: #4f46e5 !important; color: white !important; transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div class="min-h-screen flex flex-col md:flex-row">
        
        <aside class="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col sticky top-0 h-screen p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                    <i data-lucide="heart-pulse" class="text-white w-6 h-6"></i>
                </div>
                <span class="font-bold text-xl text-indigo-900 tracking-tight">MedFamília</span>
            </div>
            <nav class="space-y-2">
                <button onclick="switchTab('dashboard')" class="w-full flex items-center gap-3 p-3 text-slate-600 hover:bg-indigo-50 rounded-xl transition-all font-medium">
                    <i data-lucide="home" class="w-5 h-5"></i> Início
                </button>
                <button onclick="switchTab('config')" class="w-full flex items-center gap-3 p-3 text-slate-600 hover:bg-indigo-50 rounded-xl transition-all font-medium">
                    <i data-lucide="settings" class="w-5 h-5"></i> Configuração
                </button>
            </nav>
        </aside>

        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center z-50 h-16 px-4 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            <button onclick="switchTab('dashboard')" id="m-nav-dashboard" class="flex flex-col items-center justify-center gap-1 text-slate-400 w-16 h-full active-nav-mobile">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Início</span>
            </button>
            
            <div class="relative">
                <button onclick="toggleActionMenu()" class="bg-indigo-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 -mt-8 active:scale-90 transition-transform">
                    <i data-lucide="plus" class="w-7 h-7"></i>
                </button>
                <div id="action-menu" class="hidden absolute bottom-20 left-1/2 -translate-x-1/2 w-56 bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden flex flex-col z-[60]">
                    <button onclick="openAction('tratamento')" class="p-4 text-left text-sm font-semibold flex items-center gap-3 hover:bg-indigo-50 border-b border-slate-50"><i data-lucide="history" class="w-4 h-4 text-indigo-500"></i> Novo Tratamento</button>
                    <button onclick="openAction('paciente')" class="p-4 text-left text-sm font-semibold flex items-center gap-3 hover:bg-indigo-50 border-b border-slate-50"><i data-lucide="user-plus" class="w-4 h-4 text-blue-500"></i> Membro da Família</button>
                    <button onclick="openAction('medico')" class="p-4 text-left text-sm font-semibold flex items-center gap-3 hover:bg-indigo-50 border-b border-slate-50"><i data-lucide="stethoscope" class="w-4 h-4 text-green-500"></i> Médico</button>
                    <button onclick="openAction('patologia')" class="p-4 text-left text-sm font-semibold flex items-center gap-3 hover:bg-indigo-50"><i data-lucide="alert-circle" class="w-4 h-4 text-red-500"></i> Patologia</button>
                </div>
            </div>

            <button onclick="switchTab('config')" id="m-nav-config" class="flex flex-col items-center justify-center gap-1 text-slate-400 w-16 h-full">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-[10px] font-bold">Ajustes</span>
            </button>
        </nav>

        <main class="flex-1 bg-slate-50 pb-24 md:pb-0 overflow-y-auto h-screen">
            
            <div class="md:hidden bg-white px-6 py-5 flex flex-col gap-1 sticky top-0 z-40 border-b border-slate-50">
                <div class="flex justify-between items-center">
                    <h1 class="text-xl font-extrabold text-indigo-950">MedFamília</h1>
                    <div id="sync-indicator" class="hidden">
                        <div class="w-4 h-4 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
                <p id="sub-header-text" class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Histórico de Saúde</p>
            </div>

            <div class="p-6">
                <div id="tab-dashboard" class="tab-content space-y-6">
                    <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2" id="patient-chips-container"></div>
                    <div class="space-y-4" id="patient-treatments-view"></div>
                </div>

                <div id="tab-paciente" class="tab-content hidden max-w-lg mx-auto space-y-6">
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100">
                        <h2 class="font-bold text-lg mb-6">Membro da Família</h2>
                        <form id="form-paciente" class="space-y-4">
                            <input type="hidden" name="id">
                            <input name="nome" placeholder="Nome" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                            <input name="nascimento" type="date" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required>
                            <textarea name="historico" placeholder="Notas importantes..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none" rows="3"></textarea>
                            <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Guardar</button>
                        </form>
                    </div>
                    <div id="list-pacientes" class="space-y-2"></div>
                </div>

                <div id="tab-medico" class="tab-content hidden max-w-lg mx-auto space-y-6">
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100">
                        <h2 class="font-bold text-lg mb-6">Novo Médico</h2>
                        <form id="form-medico" class="space-y-4">
                            <input type="hidden" name="id">
                            <input name="nome" placeholder="Nome do Médico" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                            <input name="especialidade" placeholder="Especialidade" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                            <input name="contato" placeholder="Contacto" class="w-full p-4 bg-slate-50 rounded-2xl">
                            <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Guardar</button>
                        </form>
                    </div>
                    <div id="list-medicos" class="space-y-2"></div>
                </div>

                <div id="tab-patologia" class="tab-content hidden max-w-lg mx-auto space-y-6">
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100">
                        <h2 class="font-bold text-lg mb-6">Nova Patologia</h2>
                        <form id="form-patologia" class="space-y-4">
                            <input type="hidden" name="id">
                            <input name="nome" placeholder="Nome da Doença" class="w-full p-4 bg-slate-50 rounded-2xl" required>
                            <textarea name="sintomas" placeholder="Sintomas..." class="w-full p-4 bg-slate-50 rounded-2xl" rows="2"></textarea>
                            <textarea name="diagnostico" placeholder="Notas de diagnóstico..." class="w-full p-4 bg-slate-50 rounded-2xl" rows="2"></textarea>
                            <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">Guardar</button>
                        </form>
                    </div>
                    <div id="list-patologias" class="space-y-2"></div>
                </div>

                <div id="tab-tratamento" class="tab-content hidden max-w-lg mx-auto">
                    <div class="bg-white p-6 rounded-[32px] border border-slate-100">
                        <h3 class="font-bold text-lg mb-6 text-indigo-900">Novo Tratamento</h3>
                        <form id="form-tratamento" class="space-y-5">
                            <input type="hidden" name="id">
                            <select name="pacienteId" id="select-paciente" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required></select>
                            <select name="medicoId" id="select-medico" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required></select>
                            <select name="patologiaId" id="select-patologia" class="w-full p-4 bg-slate-50 rounded-2xl outline-none" required></select>

                            <div class="space-y-4">
                                <div class="flex items-center justify-between px-1">
                                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Medicamentos</h4>
                                    <button type="button" onclick="addMedicineRow()" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 font-bold rounded-full">+ Adicionar</button>
                                </div>
                                <div id="medicines-container" class="space-y-4"></div>
                            </div>

                            <textarea name="notas" placeholder="Observações do tratamento..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none" rows="2"></textarea>
                            <button type="submit" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-100">Registar Agora</button>
                        </form>
                    </div>
                </div>

                <div id="tab-config" class="tab-content hidden max-w-lg mx-auto">
                    <div class="bg-white p-8 rounded-[32px] border border-slate-100">
                        <h2 class="font-bold text-lg mb-6">Ajustes</h2>
                        <div class="space-y-4">
                            <input id="config-script-url" type="text" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" placeholder="URL do Google Script">
                            <div class="flex gap-2">
                                <button onclick="saveConfig()" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-bold">Guardar URL</button>
                                <button onclick="fetchFromGoogle()" class="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5 text-slate-600"></i></button>
                            </div>
                            <button onclick="exportData()" class="w-full text-sm text-slate-400 py-4 font-medium flex items-center justify-center gap-2 border-t"><i data-lucide="download" class="w-4 h-4"></i> Exportar Backup JSON</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="treatment-modal" class="hidden fixed inset-0 z-[100] modal-overlay flex items-end justify-center">
        <div class="bg-white w-full max-w-2xl h-[85vh] rounded-t-[40px] shadow-2xl flex flex-col translate-y-full transition-transform duration-300" id="modal-content">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto my-4"></div>
            <div class="px-8 py-4 border-b border-slate-50 flex justify-between items-center">
                <h2 class="font-bold text-xl text-indigo-900" id="modal-title">Detalhes</h2>
                <button onclick="closeTreatmentModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-8 space-y-6" id="modal-body"></div>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 left-4 right-4 z-[200] pointer-events-none"></div>

    <script>
        let state = {
            pacientes: JSON.parse(localStorage.getItem('med_pacientes') || '[]'),
            medicos: JSON.parse(localStorage.getItem('med_medicos') || '[]'),
            patologias: JSON.parse(localStorage.getItem('med_patologias') || '[]'),
            tratamentos: JSON.parse(localStorage.getItem('med_tratamentos') || '[]'),
            config: JSON.parse(localStorage.getItem('med_config') || '{"scriptUrl": ""}')
        };

        let activePatientId = null;

        window.onload = () => {
            const urlInput = document.getElementById('config-script-url');
            if (urlInput) urlInput.value = state.config.scriptUrl || '';
            if (state.pacientes.length > 0) activePatientId = state.pacientes[0].id;
            renderAll();
            if (state.config.scriptUrl) fetchFromGoogle();
            setTimeout(() => lucide.createIcons(), 500);
        };

        function refreshIcons() { if (window.lucide) window.lucide.createIcons(); }

        function saveState(shouldSync = false, action = 'update', type = null, data = null) {
            localStorage.setItem('med_pacientes', JSON.stringify(state.pacientes));
            localStorage.setItem('med_medicos', JSON.stringify(state.medicos));
            localStorage.setItem('med_patologias', JSON.stringify(state.patologias));
            localStorage.setItem('med_tratamentos', JSON.stringify(state.tratamentos));
            localStorage.setItem('med_config', JSON.stringify(state.config));
            renderAll();
            if (shouldSync && state.config.scriptUrl) syncWithGoogle(action, type, data);
        }

        function toggleActionMenu() { document.getElementById('action-menu').classList.toggle('hidden'); }
        
        function openAction(tab) {
            document.getElementById('action-menu').classList.add('hidden');
            if (tab === 'tratamento') {
                document.getElementById('medicines-container').innerHTML = '';
                addMedicineRow();
            }
            switchTab(tab);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById('tab-' + tabId);
            if (target) target.classList.remove('hidden');

            document.querySelectorAll('.nav-item-mobile').forEach(el => el.classList.remove('active-nav-mobile'));
            if (tabId === 'dashboard') document.getElementById('m-nav-dashboard').classList.add('active-nav-mobile');
            if (tabId === 'config') document.getElementById('m-nav-config').classList.add('active-nav-mobile');
            
            renderAll();
        }

        function setActivePatient(id) {
            activePatientId = id;
            renderAll();
        }

        function renderAll() {
            renderPatientChips();
            renderPatientTreatments();
            renderManagementLists();
            updateSelectOptions();
            refreshIcons();
        }

        function renderPatientChips() {
            const container = document.getElementById('patient-chips-container');
            if (!container) return;
            if (state.pacientes.length === 0) {
                container.innerHTML = '<p class="text-xs text-slate-400 italic py-2 px-2">Crie um membro no botão +</p>';
                return;
            }
            container.innerHTML = state.pacientes.map(p => `
                <button onclick="setActivePatient('${p.id}')" 
                    class="flex-shrink-0 px-6 py-3 rounded-2xl font-bold text-sm transition-all shadow-sm ${activePatientId === p.id ? 'chip-active' : 'bg-white text-slate-500 border border-slate-100'}">
                    ${p.nome}
                </button>
            `).join('');
        }

        function renderPatientTreatments() {
            const view = document.getElementById('patient-treatments-view');
            if (!view) return;
            if (!activePatientId) {
                view.innerHTML = '<div class="text-center py-20 text-slate-300">Nenhum membro selecionado</div>';
                return;
            }
            const trats = state.tratamentos.filter(t => String(t.pacienteId) === String(activePatientId));
            if (trats.length === 0) {
                view.innerHTML = `<div class="text-center py-20 bg-white rounded-[32px] border border-dashed border-slate-200 text-slate-400 text-sm italic px-6">Sem tratamentos para esta pessoa.</div>`;
                return;
            }
            view.innerHTML = '<h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Histórico</h3>' + 
                trats.reverse().map(t => {
                    const pat = state.patologias.find(p => p.id === t.patologiaId);
                    const dateStr = new Date(t.dataInicio).toLocaleDateString('pt-BR');
                    return `
                        <div onclick="showDetail('${t.id}')" class="bg-white p-5 rounded-[32px] border border-slate-100 shadow-sm flex items-center gap-4 active:scale-95 transition-all">
                            <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600">
                                <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-slate-800">${pat ? pat.nome : 'Tratamento'}</h4>
                                <p class="text-xs text-slate-400 font-medium">${dateStr} • ${t.medicamentos?.length || 0} itens</p>
                            </div>
                            <i data-lucide="chevron-right" class="text-slate-300 w-5 h-5"></i>
                        </div>
                    `;
                }).join('');
            refreshIcons();
        }

        function showDetail(id) {
            const t = state.tratamentos.find(i => i.id === id);
            if (!t) return;
            const pac = state.pacientes.find(p => p.id === t.pacienteId);
            const med = state.medicos.find(m => m.id === t.medicoId);
            const pat = state.patologias.find(p => p.id === t.patologiaId);

            document.getElementById('modal-title').innerText = pat ? pat.nome : 'Detalhes';
            const medsHtml = (t.medicamentos || []).map(m => `
                <div class="bg-slate-50 p-5 rounded-3xl border border-slate-100 space-y-2">
                    <div class="flex justify-between items-start">
                        <span class="font-extrabold text-indigo-950">${m.nome}</span>
                        <span class="text-[9px] bg-white px-2 py-1 rounded-full border border-slate-100 font-bold">Val: ${m.vencimento}</span>
                    </div>
                    <p class="text-[11px] text-indigo-500 font-bold uppercase">${m.ativo || ''}</p>
                    <div class="text-[10px] text-slate-500 space-y-1 py-2 border-t border-slate-200 mt-2">
                        ${m.classe ? `<div><strong>Classe:</strong> ${m.classe}</div>` : ''}
                        ${m.composicao ? `<div><strong>Composição:</strong> ${m.composicao}</div>` : ''}
                        ${m.indicacao ? `<div><strong>Indicação:</strong> ${m.indicacao}</div>` : ''}
                        ${m.observacao ? `<div class="bg-indigo-50/50 p-2 rounded-lg text-indigo-700 mt-1 italic">Obs: ${m.observacao}</div>` : ''}
                    </div>
                    <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                        <div class="text-[10px] text-slate-500 flex items-center gap-1 font-bold uppercase tracking-tighter"><i data-lucide="clock" class="w-3 h-3 text-indigo-300"></i> ${m.posologia || '-'}</div>
                        <div class="text-[10px] text-slate-500 flex items-center gap-1 font-bold uppercase tracking-tighter"><i data-lucide="calendar" class="w-3 h-3 text-indigo-300"></i> ${m.duracao || '-'}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('modal-body').innerHTML = `
                <div class="bg-indigo-50 p-5 rounded-3xl flex items-center gap-4">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-lg">${pac?.nome.charAt(0)}</div>
                    <div>
                        <p class="text-xs text-indigo-400 font-bold uppercase">Membro</p>
                        <p class="font-bold text-slate-800">${pac?.nome}</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Prescrição</p>
                    ${medsHtml}
                </div>
                <div class="bg-slate-900 p-6 rounded-[32px] text-white">
                    <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Médico Assistente</p>
                    <p class="font-bold text-lg">${med ? med.nome : 'N/A'}</p>
                    <p class="text-xs text-indigo-300 font-medium">${med ? med.especialidade : ''}</p>
                </div>
                ${t.notas ? `<div class="bg-white border p-5 rounded-2xl italic text-sm text-slate-500">"${t.notas}"</div>` : ''}
                <div class="pt-4 flex gap-2">
                    <button onclick="deleteItem('tratamentos', '${t.id}'); closeTreatmentModal();" class="flex-1 bg-red-50 text-red-500 py-4 rounded-2xl font-bold">Apagar</button>
                    <button onclick="closeTreatmentModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold">Fechar</button>
                </div>
            `;
            const modal = document.getElementById('treatment-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.style.transform = "translateY(0)", 10);
            refreshIcons();
        }

        function closeTreatmentModal() {
            const content = document.getElementById('modal-content');
            content.style.transform = "translateY(100%)";
            setTimeout(() => document.getElementById('treatment-modal').classList.add('hidden'), 300);
        }

        function renderManagementLists() {
            ['paciente', 'medico', 'patologia'].forEach(type => {
                const list = document.getElementById(`list-${type}s`);
                if (!list) return;
                list.innerHTML = state[`${type}s`].map(item => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-50 flex justify-between items-center shadow-sm">
                        <span class="text-sm font-bold text-slate-700">${item.nome}</span>
                        <div class="flex gap-2">
                            <button onclick="editItem('${type}', '${item.id}')" class="text-indigo-400 p-2"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                            <button onclick="deleteItem('${type}s', '${item.id}')" class="text-red-300 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function addMedicineRow() {
            const container = document.getElementById('medicines-container');
            const id = 'med-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'medicine-row p-5 bg-slate-50 rounded-[28px] relative border border-slate-100 shadow-inner';
            div.innerHTML = `
                <button type="button" onclick="document.getElementById('${id}').remove()" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
                <div class="space-y-3">
                    <input name="remedio[]" placeholder="Nome do Remédio" class="w-full p-3 bg-white rounded-xl text-sm font-bold border-none shadow-sm" required>
                    <div class="grid grid-cols-2 gap-2">
                        <input name="ativo[]" placeholder="Princípio Ativo" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm">
                        <input name="classe[]" placeholder="Classe" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input name="composicao[]" placeholder="Composição" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm">
                        <input name="indicacao[]" placeholder="Indicação" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="flex flex-col"><label class="text-[8px] font-bold text-slate-400 ml-1 mb-0.5 tracking-widest uppercase">Validade</label><input name="vencimento[]" type="date" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm" required></div>
                        <div class="flex flex-col"><label class="text-[8px] font-bold text-slate-400 ml-1 mb-0.5 tracking-widest uppercase">Dosagem</label><input name="dosagem[]" placeholder="40mg" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input name="posologia[]" placeholder="Frequência (8/8h)" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm">
                        <input name="duracao[]" placeholder="Duração (7 dias)" class="p-3 bg-white rounded-xl text-[11px] border-none shadow-sm">
                    </div>
                    <textarea name="observacao_med[]" placeholder="Observação específica deste remédio..." class="w-full p-3 bg-white rounded-xl text-[11px] border-none shadow-sm" rows="2"></textarea>
                </div>
            `;
            container.appendChild(div);
            refreshIcons();
        }

        function handleForm(e, type) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const listName = type + 's';
            const id = data.id;

            if (type === 'tratamento') {
                const meds = [];
                const names = formData.getAll('remedio[]');
                const actives = formData.getAll('ativo[]');
                const classes = formData.getAll('classe[]');
                const composicoes = formData.getAll('composicao[]');
                const indications = formData.getAll('indicacao[]');
                const valids = formData.getAll('vencimento[]');
                const doses = formData.getAll('dosagem[]');
                const posos = formData.getAll('posologia[]');
                const duras = formData.getAll('duracao[]');
                const obs = formData.getAll('observacao_med[]');
                
                for (let i = 0; i < names.length; i++) {
                    meds.push({ 
                        nome: names[i], ativo: actives[i], classe: classes[i], composicao: composicoes[i], 
                        indicacao: indications[i], vencimento: valids[i], dosagem: doses[i], 
                        posologia: posos[i], duracao: duras[i], observacao: obs[i]
                    });
                }
                data.medicamentos = meds;
                ['remedio[]', 'ativo[]', 'classe[]', 'composicao[]', 'indicacao[]', 'vencimento[]', 'dosagem[]', 'posologia[]', 'duracao[]', 'observacao_med[]'].forEach(k => delete data[k]);
            }

            if (id && id !== "") {
                const idx = state[listName].findIndex(i => String(i.id) === String(id));
                if (idx !== -1) {
                    state[listName][idx] = { ...state[listName][idx], ...data };
                    saveState(true, 'update', listName, state[listName][idx]);
                }
            } else {
                data.id = Date.now().toString();
                data.dataInicio = new Date().toISOString();
                state[listName].push(data);
                saveState(true, 'add', listName, data);
                if(type === 'paciente') activePatientId = data.id;
            }
            
            e.target.reset();
            switchTab('dashboard');
        }

        function deleteItem(list, id) {
            if (!confirm("Confirmar exclusão?")) return;
            const item = state[list].find(i => String(i.id) === String(id));
            state[list] = state[list].filter(i => String(i.id) !== String(id));
            saveState(true, 'delete', list, item);
        }

        function editItem(type, id) {
            const list = type + 's';
            const item = state[list].find(i => String(i.id) === String(id));
            if(!item) return;
            switchTab(type);
            const form = document.getElementById('form-' + type);
            Array.from(form.elements).forEach(el => {
                if (el.name && item[el.name]) el.value = item[el.name];
            });
            refreshIcons();
        }

        function updateSelectOptions() {
            const selects = { paciente: 'pacientes', medico: 'medicos', patologia: 'patologias' };
            for (let [id, list] of Object.entries(selects)) {
                const el = document.getElementById('select-' + id);
                if (el) el.innerHTML = `<option value="">Escolher ${id}</option>` + state[list].map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
            }
        }

        function saveConfig() {
            state.config.scriptUrl = document.getElementById('config-script-url').value;
            saveState();
            showToast("✓ URL Guardada");
        }

        async function syncWithGoogle(action, type, data) {
            if (!state.config.scriptUrl) return;
            document.getElementById('sync-indicator').classList.remove('hidden');
            try {
                await fetch(state.config.scriptUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, type, data }) });
                showToast("Sincronizado");
            } catch (e) { showToast("Erro sincronização", "error"); }
            finally { document.getElementById('sync-indicator').classList.add('hidden'); }
        }

        async function fetchFromGoogle() {
            if (!state.config.scriptUrl) return;
            document.getElementById('sync-indicator').classList.remove('hidden');
            try {
                const res = await fetch(state.config.scriptUrl + "?action=getAll");
                const cloud = await res.json();
                if (cloud && typeof cloud === 'object') {
                    state = { ...state, ...cloud };
                    saveState();
                    showToast("Dados atualizados");
                }
            } catch (e) { showToast("Erro importar dados", "error"); }
            finally { document.getElementById('sync-indicator').classList.add('hidden'); }
        }

        function showToast(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `p-4 mb-2 rounded-2xl shadow-xl text-white text-xs font-bold text-center border border-white/20 backdrop-blur-md transition-all duration-300 ${type === 'success' ? 'bg-indigo-600/90' : 'bg-red-500/90'}`;
            t.innerText = msg;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(-10px)'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'medfamilia_backup.json'; a.click();
        }

        document.getElementById('form-paciente').onsubmit = (e) => handleForm(e, 'paciente');
        document.getElementById('form-medico').onsubmit = (e) => handleForm(e, 'medico');
        document.getElementById('form-patologia').onsubmit = (e) => handleForm(e, 'patologia');
        document.getElementById('form-tratamento').onsubmit = (e) => handleForm(e, 'tratamento');

    </script>
</body>
</html>
